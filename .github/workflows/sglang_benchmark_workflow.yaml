name: SGLang Qwen3.5 Workflow

on:
  pull_request:
    branches:
      - Qwen3.5_v0.5.9
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:
    inputs:
      run_mode:
        description: "Which workload to run"
        required: true
        default: "accuracy"
        type: choice
        options:
          - accuracy
          - benchmark
      model_list:
        description: 'Model list to run on MI308 (JSON array format, default: ["offical_qwen3p5_397B_ptpc"])'
        required: false
        default: '["offical_qwen3p5_397B_ptpc"]'
      image:
        description: 'Image to use for the benchmark'
        required: true
        default: "rocm/ali-private:ubuntu22.04_rocm7.2.0.43_cp310_torch2.9.1_sglang_4d921e5_aiter_6fe675a_qwen3_5_20260327_v2"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE: ${{ github.event.inputs.image || 'rocm/ali-private:ubuntu22.04_rocm7.2.0.43_cp310_torch2.9.1_sglang_4d921e5_aiter_6fe675a_qwen3_5_20260327_v2' }}
  MODEL_NAME: offical_qwen3p5_397B_ptpc
  SGLANG_GITHUB_REPO_URL: ${{ github.event.pull_request.head.repo.clone_url || 'https://github.com/zejunchen-zejun/sglang.git' }}
  SGLANG_GITHUB_COMMIT_SHA: ${{ github.event.pull_request.head.sha || github.sha }}

jobs:
  qwen35:
    runs-on: linux-sglang-mi308-8
    strategy:
      fail-fast: false
      matrix:
        model: ${{ fromJson(github.event.inputs.model_list || '["offical_qwen3p5_397B_ptpc"]') }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Prepare SGLang image
        run: |
          set -euo pipefail

          if docker image inspect "${{ env.IMAGE }}" >/dev/null 2>&1; then
            echo "Using local image:"
            docker image ls "${{ env.IMAGE }}"
            exit 0
          fi

          echo "Local image not found, trying to pull: ${{ env.IMAGE }}"

          if [ -n "${{ secrets.ALISHARED }}" ]; then
            echo "${{ secrets.ALISHARED }}" | docker login -u alishared --password-stdin || true
          fi

          pulled=0
          for i in {1..3}; do
            if docker pull "${{ env.IMAGE }}"; then
              pulled=1
              break
            fi

            if [ "${i}" -lt 3 ]; then
              echo "docker pull failed, retrying ($i/3)..."
              sleep 5
            fi
          done

          if [ "${pulled}" -ne 1 ]; then
            echo "Failed to find local image and docker pull failed: ${{ env.IMAGE }}"
            echo "Available local images:"
            docker image ls --format '{{.Repository}}:{{.Tag}}\t{{.ID}}\t{{.CreatedSince}}' | sort || true
            exit 1
          fi

          echo "Pulled image:"
          docker image ls "${{ env.IMAGE }}"

      - name: Validate model path
        run: |
          set -euo pipefail

          if [ "${{ matrix.model }}" != "${{ env.MODEL_NAME }}" ]; then
            echo "Unknown model_name: ${{ matrix.model }}"
            exit 1
          fi

          if [ ! -d "/mnt/raid0/models/offical_qwen3p5_397B_ptpc" ]; then
            echo "Expected model directory not found: /mnt/raid0/models/offical_qwen3p5_397B_ptpc"
            ls -lah /mnt/raid0/models
            exit 1
          fi

          ls -lah /mnt/raid0/models
          du -sh /mnt/raid0/models/offical_qwen3p5_397B_ptpc

      - name: Generate Dockerfile
        run: |
          cat <<'EOF' > Dockerfile.mod
          FROM ${{ env.IMAGE }}
          ENV GPU_ARCHS="gfx942"
          ENV PYTORCH_ROCM_ARCH="gfx942"

          RUN echo "=== Aiter version in base image ===" && pip show amd-aiter || true
          RUN rm -rf /opt/aiter/aiter/jit/build
          RUN rm -rf /opt/aiter/aiter/jit/*.so
          RUN rm -rf ~/.aiter

          RUN echo "=== sgl-kernel version before installation ===" && pip show sgl-kernel || true
          RUN echo "=== sglang version before installation ===" && pip show sglang || true
          RUN pip uninstall -y sgl-kernel sglang || true
          RUN pip install --upgrade pip "pybind11>=3.0.1" "transformers>=4.57.0"
          RUN git clone ${{ env.SGLANG_GITHUB_REPO_URL }} /sglang-checkout && \
              cd /sglang-checkout && \
              git checkout ${{ env.SGLANG_GITHUB_COMMIT_SHA }} && \
              git rev-parse HEAD && \
              cd sgl-kernel && \
              python3 setup_rocm.py install && \
              cd .. && \
              pip install -e "python[all_hip]"

          RUN echo "=== sgl-kernel version after installation ===" && pip show sgl-kernel || true
          RUN echo "=== sglang version after installation ===" && pip show sglang || true
          EOF

      - name: Show Dockerfile
        run: |
          cat Dockerfile.mod

      - name: Build Docker image
        run: |
          docker build --pull=false --no-cache --network=host -t "sglang_test:ci" -f Dockerfile.mod .

      - name: Start CI container
        run: |
          echo "Clean up containers..."
          docker ps -aq -f name=sglang_test | xargs -r docker stop | xargs -r docker rm

          if [ -f "/etc/podinfo/gha-render-devices" ]; then
            DEVICE_FLAG=$(cat /etc/podinfo/gha-render-devices)
          else
            DEVICE_FLAG="--device /dev/dri"
          fi

          echo "Starting container: sglang_test:ci"
          docker run -dt --user root --device=/dev/kfd $DEVICE_FLAG \
            --ulimit nofile=65536:65536 \
            --ipc=host --group-add video \
            --shm-size 32g \
            --network=host \
            --privileged \
            --cap-add=SYS_PTRACE \
            -e SGLANG_VLM_CACHE_SIZE_MB=0 \
            -v /mnt/raid0/models/offical_qwen3p5_397B_ptpc:/data/models/Qwen/uc/offical_qwen3p5_397B_ptpc:ro \
            --security-opt seccomp=unconfined \
            -w /sglang-checkout \
            --name sglang_test \
            sglang_test:ci

      - name: Show installed versions
        run: |
          docker exec sglang_test bash -lc "pip show amd-aiter || true"
          docker exec sglang_test bash -lc "pip show sgl-kernel || true"
          docker exec sglang_test bash -lc "pip show sglang || true"

      - name: Show model and shared memory status
        run: |
          docker exec sglang_test bash -lc "df -h /dev/shm"
          docker exec sglang_test bash -lc "ls -lah /data/models/Qwen/uc"
          docker exec sglang_test bash -lc "du -sh /data/models/Qwen/uc/offical_qwen3p5_397B_ptpc"

      - name: Launch the server
        timeout-minutes: 120
        run: |
          set -ex
          model_name=${{ matrix.model }}
          if [ "$model_name" == "${{ env.MODEL_NAME }}" ]; then
            docker exec sglang_test bash -lc "bash scripts/ci/sglang_benchmark_workflow.sh launch ${model_name} /data/models/Qwen/uc/offical_qwen3p5_397B_ptpc 8 1 90"
          else
            echo "Unknown model_name: ${model_name}"
            exit 1
          fi

      - name: Run accuracy evaluation
        if: ${{ github.event_name == 'pull_request' || (github.event_name == 'workflow_dispatch' && github.event.inputs.run_mode == 'accuracy') }}
        timeout-minutes: 90
        run: |
          set -ex
          model_name=${{ matrix.model }}
          if [ "$model_name" == "${{ env.MODEL_NAME }}" ]; then
            docker exec sglang_test bash -lc "bash scripts/ci/sglang_benchmark_workflow.sh evaluation ${model_name} /data/models/Qwen/uc/offical_qwen3p5_397B_ptpc 8 1"
          else
            echo "Unknown model_name: ${model_name}"
            exit 1
          fi

      - name: Run nightly benchmark
        if: ${{ github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && github.event.inputs.run_mode == 'benchmark') }}
        timeout-minutes: 90
        run: |
          set -ex
          model_name=${{ matrix.model }}
          if [ "$model_name" == "${{ env.MODEL_NAME }}" ]; then
            docker exec sglang_test bash -lc "bash scripts/ci/sglang_benchmark_workflow.sh performance ${model_name} /data/models/Qwen/uc/offical_qwen3p5_397B_ptpc 8 1"
          else
            echo "Unknown model_name: ${model_name}"
            exit 1
          fi

      - name: Clean up
        if: always()
        run: |
          docker rm -f sglang_test || true
